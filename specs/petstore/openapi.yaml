openapi: "3.0.0"
info:
  title: Petstore API
  version: "1.0.0"
paths:
  /pets:
    get:
      tags: [pets]
      operationId: ListPets
      parameters:
        - name: limit
          in: query
          schema: { type: integer }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Pet' }
    post:
      tags: [pets]
      operationId: CreatePet
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/NewPet' }
      responses:
        '201':
          description: Created
  /pets/{petId}:
    get:
      tags: [pets]
      operationId: GetPetById
      parameters:
        - name: petId
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '200':
          description: OK
    delete:
      tags: [pets]
      operationId: DeletePet
      parameters:
        - name: petId
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '204':
          description: Deleted
  /health:
    get:
      operationId: HealthCheck
      responses:
        '200':
          description: OK
components:
  schemas:
    Pet:
      type: object
      required: [id, name]
      properties:
        id: { type: integer, format: int64 }
        name: { type: string }
        tag: { type: string }
    NewPet:
      type: object
      required: [name]
      properties:
        name: { type: string }
        tag: { type: string }
