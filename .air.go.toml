# .air.go.toml
root = "."
tmp_dir = "tmp"
[build]
# Build the binary
cmd = "make build"
# Run the server
entrypoint = "./bin/openapi-mock"
# Watch Go files and templates
include_ext = ["go"]
# Ignore generated and temp folders
exclude_dir = ["internal/generated", "bin", "tmp", "vendor", ".git"]
exclude_regex = ["_test.go"]
# Wait a bit for file writes to settle
delay = 5000
[log]
time = true
main_only = true
[color]
main = "magenta"
watcher = "cyan"
build = "yellow"
runner = "green"
