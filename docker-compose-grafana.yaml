services:
  grpc-mock:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: grpc-mock-app
    ports:
      # gRPC server port
      - "${GRPC_PORT:-50051}:50051"
      # Metrics port
      - "${METRICS_PORT:-9100}:9100"
      # Management API port
      - "${MGMT_PORT:-9000}:9000"
    environment:
      - HOST=0.0.0.0
      - GRPC_REFLECTION=${GRPC_REFLECTION:-true}
      - GRPC_LOGGING=${GRPC_LOGGING:-false}
    command: ["run", "--metrics-port", "9100", "--mgmt-port", "9000"]
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: grpc-mock-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yaml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    volumes:
      - ./prometheus.yaml:/etc/prometheus/prometheus.yaml:ro
      - prometheus_data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    depends_on:
      - grpc-mock
    restart: unless-stopped

  grafana:
    build:
      context: ./grafana
      dockerfile: Dockerfile
    container_name: grpc-mock-grafana
    environment:
      # Note: This refers to the internal service port (9090), which doesn't change
      - PROMETHEUS_URL=http://prometheus:9090
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  prometheus_data:
